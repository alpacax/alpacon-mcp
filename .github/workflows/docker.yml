# Docker image build & push workflow
name: Docker

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKER_IMAGE }}
          tags: |
            type=sha,format=long,prefix=,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger dev deployment (ap1)
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: image-tag-update-pr.yaml
          repo: alpacax/iac-aws
          token: ${{ secrets.DEPLOY_ACTIONS_TRIGGER_TOKEN }}
          inputs: '{"image_tag": "${{ github.sha }}", "service": "alpacon-mcp", "environment": "dev"}'

  deploy-prod:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger prod deployment (ap1)
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: image-tag-update-pr.yaml
          repo: alpacax/iac-aws
          token: ${{ secrets.DEPLOY_ACTIONS_TRIGGER_TOKEN }}
          inputs: '{"image_tag": "${{ github.ref_name }}", "service": "alpacon-mcp", "environment": "prod"}'
