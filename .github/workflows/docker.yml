# Docker image build & push workflow
name: Docker

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0  # hatch-vcs derives the version from git tags

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve package version
        id: version
        # Install hatch-vcs explicitly so the vcs version source resolves without relying on runtime bootstrap
        run: |
          pip install hatchling hatch-vcs
          # Assign first so a hatchling failure trips `set -e` here with its own
          # error, instead of leaking an empty version into a cryptic Docker build failure
          version="$(hatchling version)"
          if [ -z "$version" ] || [ "$version" = "0.0.0" ]; then
            echo "::error::Failed to resolve package version from git tags" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PUSH_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ github.event_name == 'workflow_run' && format('{0}-dev', vars.DOCKER_IMAGE) || vars.DOCKER_IMAGE }}
          tags: |
            type=raw,value=${{ github.event.workflow_run.head_sha }},enable=${{ github.event_name == 'workflow_run' }}
            type=ref,event=tag,enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          # Build context excludes .git, so the version is resolved on the runner and passed in
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    needs: build-and-push
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      # Inline App token mint instead of shared-ci wrapper:
      # alpacon-mcp is public; shared-ci is Internal so public callers
      # cannot resolve `uses: alpacax/shared-ci/...`. Mirror the wrapper
      # logic here (App token + workflow-dispatch).
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.DEPLOY_DISPATCHER_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEPLOY_DISPATCHER_PRIVATE_KEY }}
          owner: alpacax
          repositories: alpacon-gitops
          permission-actions: write

      - name: Trigger dev deployment
        uses: benc-uk/workflow-dispatch@v1.3.1
        with:
          workflow: image-tag-update-pr.yaml
          repo: alpacax/alpacon-gitops
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          inputs: '{"tag": "${{ github.event.workflow_run.head_sha }}", "service": "alpacon-mcp", "env": "dev", "job": "update_image_tag"}'

  deploy-prod:
    needs: build-and-push
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.DEPLOY_DISPATCHER_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEPLOY_DISPATCHER_PRIVATE_KEY }}
          owner: alpacax
          repositories: alpacon-gitops
          permission-actions: write

      - name: Trigger prod deployment
        uses: benc-uk/workflow-dispatch@v1.3.1
        with:
          workflow: image-tag-update-pr.yaml
          repo: alpacax/alpacon-gitops
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          inputs: '{"tag": "${{ github.ref_name }}", "service": "alpacon-mcp", "env": "prod", "job": "update_image_tag"}'
