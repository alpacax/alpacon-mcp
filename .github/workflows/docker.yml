# Docker image build & push workflow
name: Docker

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  actions: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.event_name == 'workflow_run' && format('{0}-dev', vars.DOCKER_IMAGE) || vars.DOCKER_IMAGE }}
          tags: |
            type=raw,value=${{ github.event.workflow_run.head_sha }},enable=${{ github.event_name == 'workflow_run' }}
            type=ref,event=tag,enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    needs: build-and-push
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Trigger dev deployment
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: image-tag-update-pr.yaml
          repo: alpacax/alpacon-gitops
          token: ${{ secrets.DEPLOY_ACTIONS_TRIGGER_TOKEN }}
          inputs: '{"tag": "${{ github.event.workflow_run.head_sha }}", "service": "alpacon-mcp", "env": "dev", "job": "update_image_tag"}'

  deploy-prod:
    needs: build-and-push
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Trigger prod deployment
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: image-tag-update-pr.yaml
          repo: alpacax/alpacon-gitops
          token: ${{ secrets.DEPLOY_ACTIONS_TRIGGER_TOKEN }}
          inputs: '{"tag": "${{ github.ref_name }}", "service": "alpacon-mcp", "env": "prod", "job": "update_image_tag"}'
